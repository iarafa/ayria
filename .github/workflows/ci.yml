name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install deps
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f package.json ]; then npm install; fi
    - name: Run
      run: echo "Adicionar testes quando a stack for definida"
