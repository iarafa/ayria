server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # SPA fallback — rotas React caem no index.html
    location / {
        # 🔒 SEM CACHE no index.html — entry point tem que sempre ser fresco
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/ /index.html;
    }

    # 🔒 Assets JS/CSS com hash — cache imutável (1 ano) — nome do arquivo muda a cada build
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso: tudo que começa com /api vai pro backend interno (porta 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check endpoint pro Coolify
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}