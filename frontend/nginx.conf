server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — rotas React caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache imutável pra assets com hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
