<!DOCTYPE html>
<html>
<head><title>Login Diagnostic</title></head>
<body style="font-family: monospace; padding: 20px; background: #111; color: #0f0;">
<h1 style="color: #fff;">AYRIA LOGIN DIAGNOSTIC (21/07 00:39)</h1>
<p>Esta página testa o login com payload VÁZIO e COM payload para mostrar o que acontece.</p>

<h2>Test 1: POST sem body → mostra 422</h2>
<pre id="t1"></pre>

<h2>Test 2: POST com payload → mostra 200</h2>
<pre id="t2"></pre>

<h2>Test 3: Texto digitado → POST</h2>
<input id="email" placeholder="email" value="peron@perontecnologia.com.br" style="font-size:18px; padding:5px;">
<br>
<input id="pwd" placeholder="senha" value="tech7951$" type="password" style="font-size:18px; padding:5px; margin-top:5px;">
<br>
<button id="btn" style="margin-top:10px; padding:10px 20px; font-size:16px;">Fazer login</button>
<pre id="t3"></pre>

<script type="module">
const p = (...a) => document.getElementById('a').textContent += a.join(' ') + '\n'
const out1 = document.getElementById('t1')
const out2 = document.getElementById('t2')
const out3 = document.getElementById('t3')

window.addEventListener('error', (e) => {
  out3.textContent += 'JS ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '\n'
})
window.addEventListener('unhandledrejection', (e) => {
  out3.textContent += 'PROMISE ERROR: ' + e.reason + '\n'
})

;(async () => {
  // Test 1: sem body
  try {
    const r = await fetch('/api/auth/login', {method:'POST'})
    out1.textContent = `STATUS ${r.status}\n` + (await r.text())
  } catch(e) { out1.textContent = 'ERR ' + e.message }

  // Test 2: com payload
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email:'peron@perontecnologia.com.br', password:'tech7951$'})
    })
    out2.textContent = `STATUS ${r.status}\n` + (await r.text()).substring(0,100)
  } catch(e) { out2.textContent = 'ERR ' + e.message }

  // Test 3: com state
  document.getElementById('btn').onclick = async () => {
    const email = document.getElementById('email').value
    const pwd = document.getElementById('pwd').value
    out3.textContent = `Email digitado: "${email}"\nSenha digitada: "${pwd}" (length=${pwd.length})\n\nVou tentar login...\n`
    try {
      const r = await fetch('/api/auth/login', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email, password: pwd})
      })
      const txt = await r.text()
      out3.textContent += `STATUS ${r.status}\n` + txt.substring(0,200)
    } catch(e) { out3.textContent += 'ERR ' + e.message }
  }
})()
</script>
</body>
</html>
