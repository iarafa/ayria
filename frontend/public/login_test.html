<!DOCTYPE html>
<html>
<head><title>Test Login Directo</title></head>
<body>
<div id="resultado">Rodando...</div>
<script type="module">
const log = [];
function p(...args) {
  log.push(args.join(' '));
  document.getElementById('resultado').innerText = log.join('\n');
}

window.addEventListener('error', (e) => {
  p('❌ WINDOW ERROR:', e.message, 'at', e.filename + ':' + e.lineno + ':' + e.colno);
});

try {
  // TENTAR LOGIN DIRETO (fetch puro, sem axios)
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: 'peron@perontecnologia.com.br', password: 'tech7951$' })
  });
  p('STATUS:', res.status);
  const txt = await res.text();
  p('BODY:', txt.substring(0, 300));
} catch (e) {
  p('❌ FETCH ERROR:', e.message, e.stack);
}
</script>
</body>
</html>
